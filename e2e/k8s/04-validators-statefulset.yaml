# StatefulSet for PoA validators (3 replicas)
#
# Each pod gets:
#   - Persistent volume for chain data
#   - Genesis ConfigMap mounted at /app/genesis.json
#   - Per-validator PoA config (selected via ordinal index)
#
# Image: pqevm-node:latest (built from Dockerfile.pq-reth)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pq-validator
  namespace: pqevm
  labels:
    app.kubernetes.io/name: postquantumevm
    app.kubernetes.io/component: validator
spec:
  serviceName: pq-validators-headless
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: postquantumevm
      app.kubernetes.io/component: validator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postquantumevm
        app.kubernetes.io/component: validator
    spec:
      # Init container to select the correct PoA config based on pod ordinal
      initContainers:
        - name: select-poa-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              # Extract ordinal from hostname (pq-validator-0 → 0)
              ORDINAL=$(echo $HOSTNAME | rev | cut -d'-' -f1 | rev)
              IDX=$((ORDINAL + 1))
              echo "Validator index: $IDX (hostname: $HOSTNAME)"
              cp /configs/poa-config-${IDX}.json /poa/poa-config.json
              echo "PoA config selected:"
              cat /poa/poa-config.json
          volumeMounts:
            - name: poa-configs
              mountPath: /configs
            - name: poa-selected
              mountPath: /poa

      containers:
        - name: pq-reth
          image: pqevm-node:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PQ_POA_CONFIG
              value: /poa/poa-config.json
          command:
            - pq-reth
          args:
            - "node"
            - "--chain=/app/genesis.json"
            - "--datadir=/data"
            - "--dev"
            - "--http"
            - "--http.addr=0.0.0.0"
            - "--http.port=8545"
            - "--http.api=eth,net,web3,admin"
            - "--http.corsdomain=*"
            - "--port=30303"
            - "--log.stdout.filter=info"
          ports:
            - name: http-rpc
              containerPort: 8545
              protocol: TCP
            - name: p2p-tcp
              containerPort: 30303
              protocol: TCP
            - name: p2p-udp
              containerPort: 30303
              protocol: UDP
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /
              port: 8545
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - 'curl -sf http://localhost:8545 -X POST -H "Content-Type: application/json" -d ''{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}'''
            initialDelaySeconds: 30
            periodSeconds: 15
          volumeMounts:
            - name: chain-data
              mountPath: /data
            - name: genesis
              mountPath: /app/genesis.json
              subPath: genesis.json
            - name: poa-selected
              mountPath: /poa

      volumes:
        - name: genesis
          configMap:
            name: pqevm-genesis
        - name: poa-configs
          configMap:
            name: pqevm-poa-configs
        - name: poa-selected
          emptyDir: {}

  volumeClaimTemplates:
    - metadata:
        name: chain-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
