# PoA Config ConfigMap — one per validator
# NOTE: Generate real keys with ./scripts/generate-validator-keys.sh
# and replace the placeholder configs below.
#
# To create from generated files (recommended):
#   kubectl create configmap pqevm-poa-configs -n pqevm \
#     --from-file=poa-config-1.json=scripts/validator-keys/poa-config-1.json \
#     --from-file=poa-config-2.json=scripts/validator-keys/poa-config-2.json \
#     --from-file=poa-config-3.json=scripts/validator-keys/poa-config-3.json
#
# Validator signing keys (PQ_VALIDATOR_SK) should be stored as K8s Secrets:
#   kubectl create secret generic pqevm-validator-seeds -n pqevm \
#     --from-file=seed-1.hex=scripts/validator-keys/seed-1.hex \
#     --from-file=seed-2.hex=scripts/validator-keys/seed-2.hex \
#     --from-file=seed-3.hex=scripts/validator-keys/seed-3.hex
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pqevm-poa-configs
  namespace: pqevm
  labels:
    app.kubernetes.io/name: postquantumevm
data:
  # Placeholder configs — replace with real validator keys before deploying!
  poa-config-1.json: |
    {
      "slot_time_ms": 5000,
      "local_address": "0x1000000000000000000000000000000000000001",
      "validators": [
        {
          "address": "0x1000000000000000000000000000000000000001",
          "public_key": "0x_VALIDATOR_1_ML_DSA_65_PUBLIC_KEY_HEX_"
        },
        {
          "address": "0x1000000000000000000000000000000000000002",
          "public_key": "0x_VALIDATOR_2_ML_DSA_65_PUBLIC_KEY_HEX_"
        },
        {
          "address": "0x1000000000000000000000000000000000000003",
          "public_key": "0x_VALIDATOR_3_ML_DSA_65_PUBLIC_KEY_HEX_"
        }
      ]
    }
  poa-config-2.json: |
    {
      "slot_time_ms": 5000,
      "local_address": "0x1000000000000000000000000000000000000002",
      "validators": [
        {
          "address": "0x1000000000000000000000000000000000000001",
          "public_key": "0x_VALIDATOR_1_ML_DSA_65_PUBLIC_KEY_HEX_"
        },
        {
          "address": "0x1000000000000000000000000000000000000002",
          "public_key": "0x_VALIDATOR_2_ML_DSA_65_PUBLIC_KEY_HEX_"
        },
        {
          "address": "0x1000000000000000000000000000000000000003",
          "public_key": "0x_VALIDATOR_3_ML_DSA_65_PUBLIC_KEY_HEX_"
        }
      ]
    }
  poa-config-3.json: |
    {
      "slot_time_ms": 5000,
      "local_address": "0x1000000000000000000000000000000000000003",
      "validators": [
        {
          "address": "0x1000000000000000000000000000000000000001",
          "public_key": "0x_VALIDATOR_1_ML_DSA_65_PUBLIC_KEY_HEX_"
        },
        {
          "address": "0x1000000000000000000000000000000000000002",
          "public_key": "0x_VALIDATOR_2_ML_DSA_65_PUBLIC_KEY_HEX_"
        },
        {
          "address": "0x1000000000000000000000000000000000000003",
          "public_key": "0x_VALIDATOR_3_ML_DSA_65_PUBLIC_KEY_HEX_"
        }
      ]
    }
