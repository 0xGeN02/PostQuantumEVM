          "public_key": "0x_VALIDATOR_1_ML_DSA_65_PUBLIC_KEY_HEX_"
        },
        {
          "address": "0x1000000000000000000000000000000000000002",
          "public_key": "0x_VALIDATOR_2_ML_DSA_65_PUBLIC_KEY_HEX_"
